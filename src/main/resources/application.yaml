spring:
  application:
    name: ecommerce
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce_db}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: ${PORT:8080}
